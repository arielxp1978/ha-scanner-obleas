name: Build & Publish Add-on

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [aarch64, armv7, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-python:3.11-alpine3.18
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base-python:3.11-alpine3.18
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.11-alpine3.18

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from config
        id: version
        run: echo "version=$(grep '^version:' scanner-obleas/config.yaml | awk '{print $2}' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./scanner-obleas
          platforms: ${{ matrix.platform }}
          push: true
          build-args: BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/arielxp1978/ha-scanner-obleas/${{ matrix.arch }}-scanner-obleas:latest
            ghcr.io/arielxp1978/ha-scanner-obleas/${{ matrix.arch }}-scanner-obleas:${{ steps.version.outputs.version }}
